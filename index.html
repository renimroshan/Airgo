<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirGo | Premium Travel Aggregator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        /* RESET & CORE THEME */
        :root { --espresso: #0f0a09; --gold: #c5a059; --glass: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--espresso); color: #fff; 
            font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* TOP NAVIGATION */
        nav { padding: 40px 8%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 30px; color: var(--gold); letter-spacing: 3px; font-weight: 200; text-transform: none; }
        .logo span { font-weight: 600; }
        .tagline { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; opacity: 0.4; }

        /* HERO & SEARCH ENGINE (WEGO STYLE) */
        .hero { padding: 60px 5%; text-align: center; }
        h1 { font-size: 48px; font-weight: 200; color: var(--gold); margin-bottom: 40px; letter-spacing: 2px; text-transform: uppercase; }

        .search-wrapper { 
            max-width: 1150px; margin: 0 auto; background: var(--glass); 
            padding: 35px; border-radius: 4px; border: 1px solid rgba(197, 160, 89, 0.1); 
        }
        .tabs { display: flex; gap: 30px; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tabs button { 
            background: none; border: none; color: #fff; padding: 12px 0; 
            font-size: 11px; text-transform: uppercase; cursor: pointer; opacity: 0.3; letter-spacing: 2px;
        }
        .tabs button.active { opacity: 1; border-bottom: 2px solid var(--gold); }

        .engine { 
            display: grid; grid-template-columns: 1.5fr 1.5fr 1fr 1fr 0.8fr; 
            background: #fff; border-radius: 4px; overflow: hidden; padding: 6px; gap: 2px;
        }
        .field { padding: 12px 18px; border-right: 1px solid #f0f0f0; text-align: left; }
        .field:nth-last-child(2) { border-right: none; }
        .field label { display: block; font-size: 9px; color: #aaa; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .field input { 
            width: 100%; border: none; outline: none; font-size: 15px; 
            font-family: 'Inter', sans-serif; color: #111; font-weight: 500;
        }

        .search-btn { 
            background: var(--espresso); color: var(--gold); border: 1px solid var(--gold);
            padding: 0 20px; font-size: 11px; font-weight: 600; cursor: pointer;
            text-transform: uppercase; transition: 0.3s; height: 100%; letter-spacing: 1px;
        }
        .search-btn:hover { background: var(--gold); color: #fff; }

        /* GLOBAL DISCOVERY (FIXED GRID) */
        .discovery { padding: 100px 8%; text-align: center; }
        .discovery h2 { font-size: 12px; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 50px; color: var(--gold); opacity: 0.6; font-weight: 400; }
        
        .grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; 
            max-width: 1200px; margin: 0 auto;
        }
        .card { 
            height: 320px; border-radius: 4px; position: relative; overflow: hidden; 
            display: flex; align-items: flex-end; padding: 25px;
            border: 1px solid rgba(197, 160, 89, 0.15);
            background-size: cover; background-position: center; transition: 0.5s ease;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--gold); }
        .card::after { 
            content: ''; position: absolute; inset: 0; 
            background: linear-gradient(to top, rgba(0,0,0,0.95) 10%, transparent 60%); 
        }
        .card span { position: relative; z-index: 2; font-size: 15px; font-weight: 200; letter-spacing: 3px; text-transform: uppercase; }

        footer { padding: 80px 0; text-align: center; opacity: 0.4; font-size: 10px; letter-spacing: 3px; line-height: 2; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">A<span>irGo</span></div>
        <p class="tagline">The world at your fingertips.</p>
    </nav>

    <div class="hero">
        <h1>AirGo: The World Redefined.</h1>
        
        <div class="search-wrapper">
            <div class="tabs">
                <button class="active">Flights</button>
                <button>Hotels</button>
            </div>
            <div class="engine">
                <div class="field"><label>From</label><input type="text" placeholder="Kuwait (KWI)"></div>
                <div class="field"><label>To</label><input type="text" placeholder="London (LHR)"></div>
                <div class="field"><label>Depart</label><input type="date"></div>
                <div class="field"><label>Return</label><input type="date"></div>
                <button class="search-btn">Search Flights</button>
            </div>
        </div>
    </div>

    <div class="discovery">
        <h2>Global Discovery</h2>
        <div class="grid">
            <div class="card" style="background-image: url('https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?q=80&w=800')"><span>Europe</span></div>
            <div class="card" style="background-image: url('https://images.unsplash.com/photo-1528164344705-47542687000d?q=80&w=800')"><span>Asia</span></div>
            <div class="card" style="background-image: url('https://images.unsplash.com/photo-1485738422979-f5c462d49f74?q=80&w=800')"><span>America</span></div>
            <div class="card" style="background-image: url('https://images.unsplash.com/photo-1512453979798-5ea266f8880c?q=80&w=800')"><span>Middle East</span></div>
        </div>
    </div>

    <footer>
        SUPPORT: AirGo@gmail.com | +965 99751560<br>
        © 2026 AIRGO. PREMIUM GLOBAL FLIGHT INTELLIGENCE.
    </footer>
</body>
</html>
