<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirGo | Kuwait Premium Travel</title>
    <style>
        :root { --navy: #0a192f; --gold: #c5a059; --white: #ffffff; }
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f7f6; color: var(--navy); }
        
        /* Header like Wego but better */
        header { background: var(--navy); padding: 20px 8%; border-bottom: 3px solid var(--gold); display: flex; justify-content: space-between; align-items: center; color: white; }
        .logo { font-size: 26px; font-weight: 900; letter-spacing: 4px; }
        
        /* Hero Section */
        .hero { background: var(--navy); color: white; padding: 80px 5% 120px; text-align: center; }
        .hero h1 { font-size: 45px; margin: 0; font-weight: 200; }
        .hero span { color: var(--gold); font-weight: 800; }

        /* The Search Pill - This is where the engine goes */
        .search-container { 
            max-width: 900px; 
            margin: -60px auto 40px; 
            background: white; 
            padding: 40px; 
            border-radius: 60px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); 
            border: 1px solid var(--gold); 
            text-align: center; 
        }

        .status-msg { color: #666; font-style: italic; }
    </style>
</head>
<body>

    <header>
        <div class="logo">AIRGO</div>
        <div style="font-size: 12px; color: var(--gold);">KUWAIT HUB</div>
    </header>

    <div class="hero">
        <h1>Travel <span>Redefined.</span></h1>
        <p>Your gateway from KWI to the world.</p>
    </div>

    <div class="search-container">
        <div class="status-msg">Engine offline. Waiting for Travelpayouts Fix...</div>
    </div>

    <footer style="text-align:center; padding:50px; color:#999; font-size:12px;">
        © 2026 AirGo Systems Kuwait. All Rights Reserved.
    </footer>

</body>
</html>
