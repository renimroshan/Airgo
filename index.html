<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirGo | Global Flight Comparison</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <header>
            <div class="nav-container">
                <div class="logo">AIRGO</div>
                <div class="menu">
                    <a href="#" class="active">Flights</a>
                    <a href="#">Hotels</a>
                    <a href="#">Explore</a>
                </div>
            </div>
        </header>

        <section class="hero">
            <div class="hero-content">
                <h1>The World, <span>Redefined.</span></h1>
                <p>Search and compare millions of real-time prices.</p>
                
                <div class="search-engine-box">
                    <div class="trip-type">
                        <span>Return</span>
                        <span>One-way</span>
                        <span>Multi-city</span>
                    </div>
                    <div class="search-inputs">
                        <div class="field">
                            <label>From</label>
                            <input type="text" placeholder="Origin Airport">
                        </div>
                        <div class="field">
                            <label>To</label>
                            <input type="text" placeholder="Destination Airport">
                        </div>
                        <div class="field">
                            <label>Depart</label>
                            <input type="date">
                        </div>
                        <div class="field">
                            <label>Return</label>
                            <input type="date">
                        </div>
                        <button class="btn-search">Search Flights</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="global-deals">
            <h2>Global Discovery</h2>
            <div class="deals-grid">
                <div class="deal-card"><span>Europe</span></div>
                <div class="deal-card"><span>Asia</span></div>
                <div class="deal-card"><span>America</span></div>
                <div class="deal-card"><span>Middle East</span></div>
            </div>
        </section>
    </div>
</body>
</html>
