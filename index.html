<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirGo | The World Redefined</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --espresso: #120c0b; --gold: #c5a059; --panel: rgba(255,255,255,0.05); }
        
        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: 'Inter', sans-serif; 
            background-color: var(--espresso); color: #fff; 
            overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }

        /* Nav */
        nav { padding: 30px 8%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 28px; color: var(--gold); letter-spacing: 2px; }
        .logo span { font-weight: 600; }
        .tagline { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.5; }

        /* Main Hero */
        .hero { padding: 100px 5% 60px; text-align: center; }
        h1 { font-size: 52px; font-weight: 200; color: var(--gold); margin: 0 0 10px; letter-spacing: 3px; }
        .sub-h1 { font-size: 14px; opacity: 0.6; margin-bottom: 50px; letter-spacing: 1px; }

        /* The Search Engine - Fixed Scaling */
        .search-box { 
            max-width: 1100px; margin: 0 auto; background: var(--panel); 
            padding: 30px; border-radius: 12px; border: 1px solid rgba(197, 160, 89, 0.2); 
        }
        .modes { display: flex; gap: 25px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .modes button { 
            background: none; border: none; color: #fff; padding: 10px 0; 
            font-size: 12px; text-transform: uppercase; cursor: pointer; opacity: 0.4;
        }
        .modes button.active { opacity: 1; border-bottom: 2px solid var(--gold); }

        .engine { 
            display: grid; grid-template-columns: 1.5fr 1.5fr 1fr 1fr auto; 
            background: #fff; border-radius: 6px; overflow: hidden; padding: 5px;
        }
        .field { padding: 10px 15px; border-right: 1px solid #eee; text-align: left; }
        .field:nth-last-child(2) { border-right: none; }
        .field label { display: block; font-size: 9px; color: #999; font-weight: 700; text-transform: uppercase; }
        .field input { 
            width: 100%; border: none; outline: none; font-size: 14px; 
            padding-top: 4px; font-family: 'Inter', sans-serif; color: #222;
        }

        .btn { 
            background: var(--espresso); color: var(--gold); border: 1px solid var(--gold);
            padding: 0 30px; font-size: 12px; font-weight: 600; cursor: pointer;
            text-transform: uppercase; transition: 0.3s; height: 100%;
        }
        .btn:hover { background: var(--gold); color: #fff; }

        /* Discovery - Professional Layout */
        .discovery { padding: 80px 8%; text-align: center; }
        h2 { font-size: 12px; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 40px; color: var(--gold); opacity: 0.7; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .card { 
            height: 300px; border-radius: 8px; position: relative; overflow: hidden; 
            display: flex; align-items: flex-end; padding: 20px;
            border: 1px solid rgba(197, 160, 89, 0.1);
            background-size: cover; background-position: center;
        }
        .card::after { 
            content: ''; position: absolute; inset: 0; 
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); 
        }
        .card span { position: relative; z-index: 2; font-size: 16px; font-weight: 200; letter-spacing: 2px; }

        footer { padding: 60px; text-align: center; opacity: 0.3; font-size: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">A<span>irGo</span></div>
        <div class="tagline">The world at your fingertips.</div>
    </nav>

    <div class="hero">
        <h1>The World, Redefined.</h1>
        <div class="sub-h1">Search and compare millions of real-time prices.</div>
        
        <div class="search-box">
            <div class="modes">
                <button class="active">Flights</button>
                <button>Hotels</button>
            </div>
            <div class="engine">
                <div class="field"><label>From</label><input type="text" placeholder="Origin City"></div>
                <div class="field"><label>To</label><input type="text" placeholder="Destination"></div>
                <div class="field"><label>Depart</label><input type="date"></div>
                <div class="field"><label>Return</label><input type="date"></div>
                <button class="btn">Search</button>
            </div>
        </div>
    </div>

    <div class="discovery">
        <h2>Global Discovery</h2>
        <div class="grid">
            <div class="card" style="background-image: url('https://images.unsplash.com/photo-1493397212122-2b85def82820?auto=format&fit=crop&w=600')"><span>Europe</span></div>
            <div class="card" style="background-image: url('https://images.unsplash.com/photo-1464817739973-0128fe79aa1b?auto=format&fit=crop&w=600')"><span>Asia</span></div>
            <div class="card" style="background-image: url('https://images.unsplash.com/photo-1485738422979-f5c462d49f74?auto=format&fit=crop&w=600')"><span>America</span></div>
            <div class="card" style="background-image: url('https://images.unsplash.com/photo-1512453979798-5ea266f8880c?auto=format&fit=crop&w=600')"><span>Middle East</span></div>
        </div>
    </div>

    <footer>
        SUPPORT: AirGo@gmail.com | +965 99751560<br><br>
        © 2026 AIRGO. PREMIUM GLOBAL FLIGHT INTELLIGENCE.
    </footer>
</body>
</html>
